<div class="app-wrapper">

  <div class="container py-5">

    <!-- HEADER -->
    <h2 class="text-center fw-bold gradient-text">
      🧠 AI Mock Interview Simulator
    </h2>

    <!-- ROLE INPUT -->
    <div class="card p-4 mb-4">

      <input [(ngModel)]="role"
             class="form-control"
             placeholder="Enter role">

      <div class="text-danger" *ngIf="roleError">
        {{ roleError }}
      </div>

      <button class="btn btn-primary w-100 mt-2"
              (click)="getQuestion()"
              [disabled]="loadingState !== 'IDLE'">

        🚀 Start Interview
      </button>

    </div>

    <!-- LOADING -->
    <div *ngIf="loadingState !== 'IDLE'" class="text-center">
      <div class="spinner-border"></div>
      <p>{{ loadingMessage }}</p>
    </div>

    <!-- QUESTION -->
    <div *ngIf="question" class="card p-3 mb-3">

      <h5>Question</h5>

      <p class="alert alert-info">
        {{ question }}
      </p>

      <textarea [(ngModel)]="answer"
                class="form-control"
                rows="4"
                placeholder="Write answer...">
      </textarea>

      <button class="btn btn-success w-100 mt-2"
              (click)="evaluateAnswer()"
              [disabled]="loadingState !== 'IDLE'">

        Submit Answer
      </button>

    </div>

    <!-- FEEDBACK (FIXED) -->
    <div *ngIf="feedback && feedback.length > 0" class="card p-3">

      <h5 class="mb-3">AI Feedback</h5>

      <div *ngFor="let f of feedback" class="border p-3 mb-2 rounded">

        <p>
          <b>Score:</b>
          <span [ngClass]="getScoreClass(f.score)">
            {{ f.score }}/10
          </span>
        </p>

        <p><b>Good:</b> {{ f.good }}</p>
        <p><b>Missing:</b> {{ f.missing }}</p>

        <p><b>Improved Answer:</b></p>
        <pre>{{ f.improvedAnswer }}</pre>

      </div>

    </div>

  </div>

</div>
